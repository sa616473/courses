<!DOCTYPE html>
<html lang="en">
<title>Starting Lineup</title>

<body>
   <h1>Starting Lineup</h1>
   
   <!-- Place your form here -->
   <form action="https://wp.zybooks.com/form-viewer.php" method="POST">
      <label>
         <label for="status">Status:</label>
         <label for="Draft">Draft<input type="radio" name="status" id="draft">
         </label>
         <label for="Final">Final<input type="radio" name="status" id="final">
         </label>
      </label>
      <select name="gameDate">
         <option>March 20</option>
         <option>March 24</option>
         <option>April 2</option>
         <option>April 6</option>
         <option>April 13</option>
      </select>
      <label>
         <label>Players:</label>
            <label>
            <input type="checkbox" name="player" id="Aarav" value="Aarav Agarwal">Aarav Agarwal</label>
            <label>
            <input type="checkbox" name="player" id="Ava" value="Ava Johnson">Ava Johnson</label>
            <label>
            <input type="checkbox" name="player" id="Julio" value="Julio Ortiz">Julio Ortiz</label>
            <label>
            <input type="checkbox" name="player" id="Liam" value="Liam Rubio">Liam Rubio</label>
            <label>
            <input type="checkbox" name="player" id="Emma" value="Emma Witherspoon">Emma Witherspoon</label>
         </label>
      </label> 
      <input type="submit" value="Submit">
   </form>
   
</body>

</html>
